<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--gold:#D4A017;--green:#1A6B3C;--red:#C0392B;--ink:#0D0D0D;--cream:#FDFAF3;--mist:#F0EBE0;--border:#E2D9C8;--gray:#7A7265;--purple:#9B59B6;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Epilogue',sans-serif;background:var(--cream);color:var(--ink);}

  header{background:var(--ink);padding:11px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200;}
  .back{background:rgba(255,255,255,.1);border:none;color:#fff;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;text-decoration:none;flex-shrink:0;}
  .htitle{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .hshr{background:rgba(255,255,255,.1);border:none;color:#fff;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;}

  /* PLAN HEADER STRIP */
  .plan-strip{height:5px;width:100%;}
  .strip-premium{background:linear-gradient(90deg,var(--purple),#FFD700);}
  .strip-featured{background:linear-gradient(90deg,var(--gold),#FFA500);}
  .strip-standard{background:var(--green);}
  .strip-basic{background:var(--border);}

  /* HERO */
  .biz-hero{width:100%;height:200px;background:var(--mist);display:flex;align-items:center;justify-content:center;font-size:64px;overflow:hidden;position:relative;}
  .biz-hero img{width:100%;height:100%;object-fit:cover;}
  .hero-ov{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,rgba(13,13,13,.55) 100%);}

  /* PLAN RIBBON */
  .plan-ribbon{position:absolute;top:14px;left:0;font-size:10px;font-weight:800;padding:5px 12px 5px 10px;clip-path:polygon(0 0,100% 0,calc(100% - 9px) 100%,0 100%);letter-spacing:.06em;z-index:2;}
  .ribbon-premium{background:linear-gradient(90deg,var(--purple),#c39bd3);color:#fff;}
  .ribbon-featured{background:var(--gold);color:var(--ink);}
  .ribbon-standard{background:var(--green);color:#fff;}

  /* MAIN CARD */
  .main-card{background:#fff;padding:14px 14px 16px;border-bottom:1px solid var(--border);}
  .biz-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:7px;}
  .biz-name{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--ink);line-height:1.15;}
  .badges{display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0;}
  .badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px;white-space:nowrap;}
  .b-premium{background:var(--purple);color:#fff;}
  .b-featured{background:var(--gold);color:var(--ink);}
  .b-standard{background:var(--green);color:#fff;}
  .b-verified{background:var(--green);color:#fff;}
  .biz-cat{font-size:12px;font-weight:700;color:var(--green);letter-spacing:.05em;text-transform:uppercase;margin-bottom:7px;}
  .rating-row{display:flex;align-items:center;gap:7px;margin-bottom:9px;}
  .stars{font-size:16px;color:var(--gold);}
  .rnum{font-size:14px;font-weight:700;}
  .rcnt{font-size:12px;color:var(--gray);}
  .open-row{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;margin-bottom:13px;}
  .dot-o{width:8px;height:8px;border-radius:50%;background:var(--green);}
  .dot-c{width:8px;height:8px;border-radius:50%;background:var(--red);}
  .txt-o{color:var(--green);}
  .txt-c{color:var(--red);}
  .hrs{color:var(--gray);font-weight:400;font-size:12px;}

  /* EXPIRY NOTICE */
  .expiry-notice{background:#fff3cd;border:1px solid var(--gold);border-radius:10px;padding:10px 13px;font-size:12px;color:#856404;font-weight:600;margin-bottom:13px;display:none;}

  /* ACTION BUTTONS */
  .act-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
  .act-btn{padding:13px;border-radius:12px;border:none;font-family:'Epilogue',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;text-decoration:none;transition:opacity .2s;}
  .act-btn:hover{opacity:.87;}
  .btn-call{background:var(--green);color:#fff;grid-column:span 2;font-size:15px;padding:15px;}
  .btn-wa{background:#25D366;color:#fff;}
  .btn-dir{background:var(--mist);color:var(--ink);border:1.5px solid var(--border);}
  .btn-web{background:var(--ink);color:#fff;}
  .btn-shr{background:var(--mist);color:var(--ink);border:1.5px solid var(--border);}

  /* UPGRADE BANNER (shown for basic/standard) */
  .upgrade-banner{margin-top:13px;border-radius:12px;padding:13px;display:none;cursor:pointer;}
  .upgrade-banner.to-featured{background:linear-gradient(135deg,#fffbf0,#fff3cd);border:1px solid var(--gold);}
  .upgrade-banner.to-premium{background:linear-gradient(135deg,#f9f0ff,#e8d5f5);border:1px solid var(--purple);}
  .ub-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;margin-bottom:4px;}
  .ub-sub{font-size:12px;color:var(--gray);}

  /* SECTIONS */
  .section{padding:13px 14px;border-bottom:1px solid var(--border);background:#fff;margin-top:6px;}
  .sec-t{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--ink);margin-bottom:11px;display:flex;align-items:center;gap:7px;}
  .sec-t::before{content:'';width:4px;height:16px;background:var(--gold);border-radius:2px;display:block;}
  .desc{font-size:14px;color:var(--gray);line-height:1.75;}
  .info-list{display:flex;flex-direction:column;gap:11px;}
  .ii{display:flex;align-items:flex-start;gap:11px;}
  .ii-ico{font-size:18px;flex-shrink:0;width:24px;text-align:center;}
  .ii-body{flex:1;}
  .ii-lbl{font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
  .ii-val{font-size:13px;font-weight:500;color:var(--ink);}
  .ii-val a{color:var(--green);text-decoration:none;}
  #bizMap{height:200px;width:100%;background:var(--mist);}
  .tag-cloud{display:flex;flex-wrap:wrap;gap:7px;}
  .tag{background:var(--mist);color:var(--gray);font-size:12px;font-weight:500;padding:5px 11px;border-radius:10px;}

  /* REVIEWS */
  .rev-card{background:var(--cream);border-radius:12px;padding:12px;margin-bottom:9px;border:1px solid var(--border);}
  .rv-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
  .rv-name{font-size:13px;font-weight:700;color:var(--ink);}
  .rv-stars{font-size:13px;color:var(--gold);}
  .rv-txt{font-size:13px;color:var(--gray);line-height:1.6;}
  .rv-date{font-size:11px;color:var(--gray);margin-top:4px;}
  .rev-form{background:var(--cream);border-radius:12px;padding:13px;border:1px solid var(--border);margin-top:11px;}
  .rf-title{font-size:13px;font-weight:700;margin-bottom:9px;}
  .rv-stars-sel{display:flex;gap:7px;margin-bottom:9px;}
  .rs{font-size:26px;cursor:pointer;color:#ddd;transition:color .15s;}
  .rs.active{color:var(--gold);}
  .rev-form input,.rev-form textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-family:'Epilogue',sans-serif;font-size:13px;outline:none;background:#fff;margin-bottom:8px;}
  .rev-form textarea{resize:none;min-height:80px;}
  .rev-form input:focus,.rev-form textarea:focus{border-color:var(--gold);}
  .sub-rev{width:100%;background:var(--green);color:#fff;border:none;padding:11px;border-radius:10px;font-family:'Epilogue',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}

  /* SIMILAR */
  .sim-scroll{display:flex;gap:11px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;}
  .sim-scroll::-webkit-scrollbar{display:none;}
  .sim-card{flex-shrink:0;width:145px;background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden;cursor:pointer;text-decoration:none;color:inherit;}
  .sim-thumb{width:100%;height:76px;background:var(--mist);display:flex;align-items:center;justify-content:center;font-size:26px;overflow:hidden;}
  .sim-thumb img{width:100%;height:100%;object-fit:cover;}
  .sim-body{padding:8px;}
  .sim-name{font-family:'Syne',sans-serif;font-size:12px;font-weight:800;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sim-loc{font-size:10px;color:var(--gray);margin-top:2px;}

  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:6px 0 env(safe-area-inset-bottom,16px);z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,.07);}
  .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 12px;}
  .ni{font-size:20px;color:var(--gray);}
  .nl{font-size:10px;font-weight:500;color:var(--gray);}
  .spacer{height:80px;}
  .loading{text-align:center;padding:56px 20px;color:var(--gray);font-size:14px;}
  .spin{display:inline-block;width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:sp .8s linear infinite;margin-bottom:10px;}
  @keyframes sp{to{transform:rotate(360deg)}}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(40px);background:var(--ink);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.25);transition:transform .3s;z-index:999;}
  .toast.show{transform:translateX(-50%) translateY(0);}

  @media(max-width:390px){
    .biz-hero{height:170px;}
    .act-grid{grid-template-columns:1fr 1fr;}
    .act-btn{font-size:11px;padding:10px 6px;}
    .biz-name{font-size:18px;}
    .sim-card{width:130px;}
  }

  .reviews-section{background:#fff;padding:14px;margin-top:6px;}
  .review-card{background:var(--cream);border-radius:12px;padding:12px;margin-bottom:10px;border:1px solid var(--border);}
  .review-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .rev-avatar{width:34px;height:34px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;}
  .rev-name{font-size:13px;font-weight:700;}
  .rev-stars{font-size:12px;color:var(--gold);}
  .rev-date{font-size:10px;color:var(--gray);margin-left:auto;}
  .rev-text{font-size:13px;color:var(--gray);line-height:1.6;}
  .review-form{background:var(--mist);border-radius:14px;padding:14px;margin-top:12px;border:1px solid var(--border);}
  .star-pick{display:flex;gap:6px;margin:8px 0;}
  .star-pick span{font-size:26px;cursor:pointer;filter:grayscale(1);transition:filter .15s;}
  .star-pick span.sel{filter:grayscale(0);}
  .rev-input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-family:'Epilogue',sans-serif;font-size:13px;outline:none;resize:vertical;min-height:70px;background:#fff;}
  .rev-input:focus{border-color:var(--gold);}
  .rev-submit{width:100%;background:var(--green);color:#fff;border:none;padding:11px;border-radius:10px;font-family:'Syne',sans-serif;font-size:13px;font-weight:800;cursor:pointer;margin-top:8px;}
  .rev-avg{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);margin-bottom:12px;}
  .rev-avg-num{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--gold);}
  .rev-avg-stars{font-size:18px;color:var(--gold);}
  .rev-avg-count{font-size:12px;color:var(--gray);}

  #lightbox{touch-action:none;}
  .lb-nav-btn{background:rgba(255,255,255,.15);border:none;color:#fff;width:42px;height:42px;border-radius:50%;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);flex-shrink:0;}
  .lb-thumbs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;max-width:94vw;padding:4px 0;}
  .lb-thumb{width:48px;height:42px;border-radius:6px;object-fit:cover;cursor:pointer;opacity:.5;border:2px solid transparent;flex-shrink:0;transition:all .2s;}
  .lb-thumb.active{opacity:1;border-color:var(--gold);}
</style>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBxVDEPMpSOEH4S-hYjx2ROXBlwd06f4O4&loading=async&callback=Function.prototype" async defer>
// ── LIGHTBOX ──
let lbImages=[], lbIndex=0, lbTouchX=0;

window.openLightbox=(idx)=>{
  const b=window._curBiz;
  lbImages=(b?.images?.length?b.images:[b?.imageUrl].filter(Boolean)).filter(Boolean);
  if(!lbImages.length)return;
  lbIndex=idx||0;
  document.getElementById('lightbox').style.display='flex';
  document.body.style.overflow='hidden';
  updateLb();
};
window.closeLightbox=()=>{
  document.getElementById('lightbox').style.display='none';
  document.body.style.overflow='';
};
window.nextImg=()=>{lbIndex=(lbIndex+1)%lbImages.length;updateLb();};
window.prevImg=()=>{lbIndex=(lbIndex-1+lbImages.length)%lbImages.length;updateLb();};

function updateLb(){
  const img=document.getElementById('lbImg');
  img.style.opacity='0';
  img.src=lbImages[lbIndex];
  img.onload=()=>{img.style.opacity='1';img.style.transition='opacity .2s';};
  document.getElementById('lbCounter').textContent=`${lbIndex+1} / ${lbImages.length}`;
  // Thumbnails
  const thumbs=document.getElementById('lbThumbs');
  if(thumbs){
    thumbs.innerHTML=lbImages.map((img,i)=>
      `<img src="${img}" class="lb-thumb${i===lbIndex?' active':''}" onclick="lbIndex=${i};updateLb()" onerror="this.style.display='none'">`
    ).join('');
    // Scroll active thumb into view
    const activeThumb=thumbs.querySelectorAll('.lb-thumb')[lbIndex];
    if(activeThumb) activeThumb.scrollIntoView({inline:'center',behavior:'smooth'});
  }
}

// Swipe support
const lb=document.getElementById('lightbox');
if(lb){
  lb.addEventListener('touchstart',e=>{lbTouchX=e.touches[0].clientX;},{passive:true});
  lb.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-lbTouchX;
    if(Math.abs(dx)>50){dx<0?nextImg():prevImg();}
  },{passive:true});
}
// Keyboard
document.addEventListener('keydown',e=>{
  if(document.getElementById('lightbox').style.display==='flex'){
    if(e.key==='ArrowRight')nextImg();
    else if(e.key==='ArrowLeft')prevImg();
    else if(e.key==='Escape')closeLightbox();
  }
});


// ── REVIEWS SYSTEM ──
let selStars = 0, curBizId = '';

async function loadReviews(bizId){
  curBizId = bizId;
  const wrap = document.getElementById('bizWrap');
  // Add reviews section
  const revSection = document.createElement('div');
  revSection.className = 'reviews-section';
  revSection.id = 'reviewsSection';
  revSection.innerHTML = `
    <div class="sec-t">⭐ Reviews</div>
    <div id="revAvg" style="color:var(--gray);font-size:13px;">Loading reviews…</div>
    <div id="revList"></div>
    <div class="review-form">
      <div style="font-family:'Syne',sans-serif;font-size:13px;font-weight:800;margin-bottom:4px;">Leave a Review</div>
      <div class="star-pick" id="starPick">
        <span onclick="pickStar(1)">⭐</span><span onclick="pickStar(2)">⭐</span>
        <span onclick="pickStar(3)">⭐</span><span onclick="pickStar(4)">⭐</span>
        <span onclick="pickStar(5)">⭐</span>
      </div>
      <div style="margin-bottom:8px;"><input type="text" id="revName" placeholder="Your name" style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;outline:none;margin-bottom:7px;" onfocus="this.style.borderColor='var(--gold)'" onblur="this.style.borderColor='var(--border)'"></div>
      <textarea class="rev-input" id="revText" placeholder="Share your experience…"></textarea>
      <button class="rev-submit" onclick="submitReview()">📝 Submit Review</button>
    </div>
  `;
  wrap.appendChild(revSection);

  try{
    // Using top-level Firestore imports
    const snap = await getDocs(query(collection(db,'businesses',bizId,'reviews'), orderBy('createdAt','desc')));
    const reviews = snap.docs.map(d=>({id:d.id,...d.data()}));
    const avg = reviews.length ? (reviews.reduce((s,r)=>s+r.stars,0)/reviews.length).toFixed(1) : null;
    document.getElementById('revAvg').innerHTML = reviews.length ? `
      <div class="rev-avg">
        <div class="rev-avg-num">${avg}</div>
        <div><div class="rev-avg-stars">${'⭐'.repeat(Math.round(avg))}</div><div class="rev-avg-count">${reviews.length} review${reviews.length!==1?'s':''}</div></div>
      </div>` : '<div style="font-size:13px;color:var(--gray);margin-bottom:10px;">No reviews yet — be the first!</div>';
    document.getElementById('revList').innerHTML = reviews.map(r=>`
      <div class="review-card">
        <div class="review-header">
          <div class="rev-avatar">${(r.name||'A')[0].toUpperCase()}</div>
          <div><div class="rev-name">${esc(r.name||'Anonymous')}</div><div class="rev-stars">${'⭐'.repeat(r.stars||5)}</div></div>
          <div class="rev-date">${r.createdAt?.toDate?r.createdAt.toDate().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):''}</div>
        </div>
        <div class="rev-text">${esc(r.comment||'')}</div>
      </div>`).join('');
  }catch(e){ document.getElementById('revAvg').textContent='Could not load reviews.'; }
}

window.pickStar = n => {
  selStars = n;
  document.querySelectorAll('#starPick span').forEach((s,i)=>s.classList.toggle('sel',i<n));
};

window.submitReview = async () => {
  if(!selStars){ alert('Please select a star rating'); return; }
  const name = document.getElementById('revName').value.trim();
  const comment = document.getElementById('revText').value.trim();
  if(!comment){ alert('Please write a comment'); return; }
  const btn = document.querySelector('.rev-submit');
  btn.disabled=true; btn.textContent='Submitting…';
  try{
    // Use top-level Firestore imports (already loaded)
    await addDoc(collection(db,'businesses',curBizId,'reviews'),{
      name: name||'Anonymous', comment, stars:selStars,
      createdAt: serverTimestamp()
    });
    // Update business avg rating
    // updateDoc available from top-level import
    showToast('✅ Review submitted! Thank you.');
    document.getElementById('revText').value='';
    document.getElementById('revName').value='';
    selStars=0;
    document.querySelectorAll('#starPick span').forEach(s=>s.classList.remove('sel'));
    loadReviews(curBizId);
  }catch(e){ showToast('❌ '+e.message); }
  finally{ btn.disabled=false; btn.textContent='📝 Submit Review'; }
};

</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc, arrayUnion, collection, query, where, getDocs, limit, addDoc, orderBy, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDdvBbM753KjhpQjkBasKWDMi2O43GRISM",
  authDomain: "citylinkgh-48ee0.firebaseapp.com",
  projectId: "citylinkgh-48ee0",
  storageBucket: "citylinkgh-48ee0.firebasestorage.app",
  messagingSenderId: "807811031269",
  appId: "1:807811031269:web:167b22e23f49992136340c"
};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const catEmoji={Restaurant:'🍽️',Hospital:'🏥',Hotel:'🏨',Salon:'💇',Pharmacy:'💊',School:'🎓',Church:'⛪',Mechanic:'🔧',Lawyer:'⚖️','Event Planner':'🎉',Supermarket:'🛒',Other:'🏢'};

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function starsH(r){const n=Math.round(r||0);return '★'.repeat(n)+'☆'.repeat(5-n);}
function fmt12(t){if(!t)return '';const[h,m]=t.split(':').map(Number);return`${h%12||12}:${String(m).padStart(2,'0')} ${h>=12?'PM':'AM'}`;}
function isOpen(o,c){if(!o||!c)return null;const now=new Date(),cur=now.getHours()*60+now.getMinutes();const[oh,om]=o.split(':').map(Number),[ch,cm]=c.split(':').map(Number);return cur>=oh*60+om&&cur<=ch*60+cm;}
function daysLeft(b){if(!b.expiresAt||b.plan==='basic')return null;const exp=b.expiresAt?.toDate?b.expiresAt.toDate().getTime():new Date(b.expiresAt).getTime();return Math.ceil((exp-Date.now())/86400000);}

let curBiz = null;
window._curBiz = null;
let revRating = 0;
let toastT;
window.showToast=m=>{const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2500);};

window.setRS=v=>{revRating=v;document.querySelectorAll('.rs').forEach(s=>s.classList.toggle('active',Number(s.dataset.v)<=v));};

window.submitReview=async bizId=>{
  const text=document.getElementById('revText').value.trim(),name=document.getElementById('revName').value.trim()||'Anonymous';
  if(!revRating){showToast('⭐ Select a rating');return;}
  if(!text){showToast('✍️ Write a review');return;}
  const rev={name,text,rating:revRating,date:new Date().toISOString()};
  try{
    const revs=[...(curBiz.reviews||[]),rev];
    const avg=revs.reduce((s,r)=>s+r.rating,0)/revs.length;
    await updateDoc(doc(db,'businesses',bizId),{reviews:arrayUnion(rev),rating:Math.round(avg*10)/10});
    curBiz.reviews=revs; curBiz.rating=Math.round(avg*10)/10;
    renderRevs(bizId);
    document.getElementById('revText').value='';document.getElementById('revName').value='';
    revRating=0;document.querySelectorAll('.rs').forEach(s=>s.classList.remove('active'));
    showToast('✅ Review submitted!');
  }catch(e){showToast('❌ Failed: '+e.message);}
};

function renderRevs(bizId){
  const el=document.getElementById('revsList');
  const revs=(curBiz.reviews||[]).slice().reverse();
  el.innerHTML=revs.length?revs.slice(0,10).map(r=>`
    <div class="rev-card">
      <div class="rv-hdr"><div class="rv-name">${esc(r.name)}</div><div class="rv-stars">${starsH(r.rating)}</div></div>
      <div class="rv-txt">${esc(r.text)}</div>
      <div class="rv-date">${new Date(r.date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div>
    </div>`).join(''):`<p style="color:var(--gray);font-size:13px;">No reviews yet — be the first!</p>`;
}

function initMap(b){
  if(!b.lat||!b.lng||typeof google==='undefined')return;
  const el=document.getElementById('bizMap');if(!el)return;
  const mapColors={premium:'#9B59B6',featured:'#D4A017',standard:'#1A6B3C',basic:'#7A7265'};
  const m=new google.maps.Map(el,{center:{lat:Number(b.lat),lng:Number(b.lng)},zoom:15,mapTypeControl:false,streetViewControl:false,fullscreenControl:false,styles:[{featureType:'poi',elementType:'labels',stylers:[{visibility:'off'}]}]});
  const mk=new google.maps.Marker({position:{lat:Number(b.lat),lng:Number(b.lng)},map:m,title:b.name,icon:{path:google.maps.SymbolPath.CIRCLE,scale:12,fillColor:mapColors[b.plan||'basic'],fillOpacity:1,strokeColor:'#fff',strokeWeight:2}});
  const iw=new google.maps.InfoWindow({content:`<div style="font-family:'Syne',sans-serif;font-weight:800;font-size:13px;">${esc(b.name)}</div><div style="font-size:11px;color:#7A7265;">📍 ${esc(b.location||b.city||'')}</div>`});
  mk.addListener('click',()=>iw.open(m,mk));
}

window.shareBiz=()=>{
  const url=window.location.href;
  const text=`🏪 ${curBiz?.name||'Business'} on CityLinkGH\n📍 ${curBiz?.location||curBiz?.city||'Ghana'}\n📞 ${curBiz?.phone||''}\n\n👉 ${url}`;
  if(navigator.share) navigator.share({title:document.title,text,url});
  else navigator.clipboard.writeText(url).then(()=>showToast('🔗 Link copied!'));
  const waBtn=document.getElementById('waShareBtn');
  if(waBtn) waBtn.href='https://wa.me/?text='+encodeURIComponent(text);
};

async function init(){
  const id=new URLSearchParams(window.location.search).get('id');
  if(!id){document.getElementById('content').innerHTML='<div class="loading">❌ No ID provided.</div>';return;}
  try{
    const snap=await getDoc(doc(db,'businesses',id));
    if(!snap.exists()){document.getElementById('content').innerHTML='<div class="loading">❌ Business not found.</div>';return;}
    curBiz={id:snap.id,...snap.data()};
    const b=curBiz;
    document.title=`${b.name} — CityLinkGH`;
    document.getElementById('htitle').textContent=b.name;

    const plan=b.plan||'basic';
    const emoji=catEmoji[b.category]||'🏢';
    const openS=isOpen(b.openTime,b.closeTime);
    const days=daysLeft(b);
    const rawWa=(b.whatsapp||b.phone||'').replace(/\D/g,'');
    const waNum=rawWa.startsWith('233')?rawWa.slice(3):rawWa.startsWith('0')?rawWa.slice(1):rawWa;

    // Similar
    let simHtml='';
    try{
      const sq=query(collection(db,'businesses'),where('category','==',b.category),where('approved','==',true),limit(6));
      const ss=await getDocs(sq);
      const sim=ss.docs.map(d=>({id:d.id,...d.data()})).filter(s=>s.id!==id).slice(0,5);
      if(sim.length)simHtml=`<div class="section"><div class="sec-t">Similar Businesses</div><div class="sim-scroll">${sim.map(s=>`<a class="sim-card" href="business.html?id=${s.id}"><div class="sim-thumb">${s.imageUrl?`<img src="${esc(s.imageUrl)}" alt="">`:`${catEmoji[s.category]||'🏢'}`}</div><div class="sim-body"><div class="sim-name">${esc(s.name)}</div><div class="sim-loc">📍 ${esc(s.city||s.location||'')}</div></div></a>`).join('')}</div></div>`;
    }catch(_){}

    // Plan ribbon HTML
    const ribbonHtml = plan==='premium'?`<div class="plan-ribbon ribbon-premium">👑 PREMIUM</div>`:plan==='featured'?`<div class="plan-ribbon ribbon-featured">⭐ FEATURED</div>`:plan==='standard'?`<div class="plan-ribbon ribbon-standard">✓ STANDARD</div>`:'';

    // Badges
    const badgeHtml = [
      plan==='premium'?'<span class="badge b-premium">👑 Premium</span>':'',
      plan==='featured'?'<span class="badge b-featured">⭐ Featured</span>':'',
      plan==='standard'?'<span class="badge b-standard">✓ Standard</span>':'',
      b.verified?'<span class="badge b-verified">✓ Verified</span>':''
    ].filter(Boolean).join('');

    // Upgrade banner
    const upgradeHtml = plan==='basic'?`<div class="upgrade-banner to-featured" onclick="window.location='submit.html'" style="display:block;"><div class="ub-title">⭐ Upgrade to Featured — GHS 100/mo</div><div class="ub-sub">Get gold border, top placement & verified badge. Tap to upgrade.</div></div>`:plan==='standard'?`<div class="upgrade-banner to-premium" onclick="window.location='submit.html'" style="display:block;"><div class="ub-title">👑 Upgrade to Premium — GHS 200/mo</div><div class="ub-sub">Get into the Premium Spotlight & #1 placement. Tap to upgrade.</div></div>`:'';

    document.getElementById('content').innerHTML=`
      <div class="plan-strip strip-${plan}"></div>

      <div class="biz-hero" onclick="openLightbox(0)" style="cursor:pointer;">
        ${b.imageUrl?`<img src="${esc(b.imageUrl)}" alt="${esc(b.name)}" onerror="this.style.display='none'">`:`${emoji}`}
        <div class="hero-ov"></div>
        ${ribbonHtml}
        ${(b.images&&b.images.length>1)?`<div style="position:absolute;bottom:10px;right:12px;background:rgba(0,0,0,.55);color:#fff;font-size:11px;font-weight:700;padding:4px 9px;border-radius:20px;">📷 ${b.images.length}</div>`:''}
      </div>

      ${(b.images&&b.images.length>1)?`
      <div style="display:flex;gap:7px;overflow-x:auto;padding:10px 14px;scrollbar-width:none;background:#fff;">
        ${b.images.map((img,i)=>`<img src="${esc(img)}" onclick="openLightbox(${i})" style="width:70px;height:60px;object-fit:cover;border-radius:8px;cursor:pointer;flex-shrink:0;border:2px solid ${i===0?'var(--gold)':'var(--border)'};" onerror="this.style.display='none'">`).join('')}
      </div>`:''}

      <div id="lightbox" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:999;flex-direction:column;align-items:center;justify-content:center;" onclick="closeLightbox()">
        <!-- TOP BAR -->
        <div style="position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:linear-gradient(rgba(0,0,0,.5),transparent);" onclick="event.stopPropagation()">
          <div id="lbCounter" style="color:rgba(255,255,255,.7);font-size:13px;font-weight:600;"></div>
          <button onclick="closeLightbox()" style="background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;">✕</button>
        </div>
        <!-- IMAGE -->
        <div style="display:flex;align-items:center;gap:10px;width:100%;justify-content:center;padding:0 8px;" onclick="event.stopPropagation()">
          <button class="lb-nav-btn" onclick="prevImg()">‹</button>
          <img id="lbImg" src="" style="max-width:calc(100vw - 100px);max-height:72vh;border-radius:10px;object-fit:contain;flex:1;">
          <button class="lb-nav-btn" onclick="nextImg()">›</button>
        </div>
        <!-- THUMBNAIL STRIP -->
        <div id="lbThumbs" class="lb-thumbs" style="margin-top:14px;" onclick="event.stopPropagation()"></div>
      </div>

      <div class="main-card">
        <div class="biz-hdr">
          <div class="biz-name">${esc(b.name)}</div>
          <div class="badges">${badgeHtml}</div>
        </div>
        <div class="biz-cat">${esc(b.category)}</div>
        ${b.rating?`<div class="rating-row"><span class="stars">${starsH(b.rating)}</span><span class="rnum">${Number(b.rating).toFixed(1)}</span><span class="rcnt">(${(b.reviews||[]).length} review${(b.reviews||[]).length!==1?'s':''})</span></div>`:''}
        ${openS!==null?`<div class="open-row"><div class="${openS?'dot-o':'dot-c'}"></div><span class="${openS?'txt-o':'txt-c'}">${openS?'Open Now':'Closed'}</span>${b.openTime?`<span class="hrs">· ${fmt12(b.openTime)} – ${fmt12(b.closeTime)}</span>`:''}</div>`:''}
        ${days!==null&&days<=7?`<div class="expiry-notice" style="display:block;">⚠️ This listing expires in ${days} day${days!==1?'s':''}. <a href="submit.html" style="color:var(--red);font-weight:700;">Renew now →</a></div>`:''}

        <div class="act-grid">
          ${b.phone?`<a class="act-btn btn-call" href="tel:${esc(b.phone)}">📞 Call Now</a>`:''}
          ${waNum?`<a class="act-btn btn-wa" href="https://wa.me/233${waNum}" target="_blank">💬 WhatsApp</a>`:''}
          <a class="act-btn btn-dir" href="https://www.google.com/maps/search/${encodeURIComponent((b.name||'')+' '+(b.location||'')+(b.city||''))}" target="_blank">🗺️ Directions</a>
          ${b.website?`<a class="act-btn btn-web" href="${esc(b.website)}" target="_blank">🌐 Website</a>`:''}
          <button class="act-btn btn-shr" onclick="shareBiz()">🔗 Share</button>
          <a class="act-btn btn-wa" style="background:#128C7E;" href="#" id="waShareBtn" target="_blank">📤 WhatsApp Share</a>
        </div>
        ${upgradeHtml}
      </div>

      ${b.desc?`<div class="section"><div class="sec-t">About</div><div class="desc">${esc(b.desc)}</div></div>`:''}

      <div class="section">
        <div class="sec-t">Contact & Info</div>
        <div class="info-list">
          ${b.location||b.city?`<div class="ii"><div class="ii-ico">📍</div><div class="ii-body"><div class="ii-lbl">Address</div><div class="ii-val">${esc(b.location||'')}${b.location&&b.city?', ':''}${esc(b.city||'')}</div></div></div>`:''}
          ${b.phone?`<div class="ii"><div class="ii-ico">📞</div><div class="ii-body"><div class="ii-lbl">Phone</div><div class="ii-val"><a href="tel:${esc(b.phone)}">${esc(b.phone)}</a></div></div></div>`:''}
          ${b.whatsapp?`<div class="ii"><div class="ii-ico">💬</div><div class="ii-body"><div class="ii-lbl">WhatsApp</div><div class="ii-val"><a href="https://wa.me/233${(()=>{const r=(b.whatsapp).replace(/\D/g,'');return r.startsWith('233')?r.slice(3):r.startsWith('0')?r.slice(1):r;})()}" target="_blank">${esc(b.whatsapp)}</a></div></div></div>`:''}
          ${b.email?`<div class="ii"><div class="ii-ico">✉️</div><div class="ii-body"><div class="ii-lbl">Email</div><div class="ii-val"><a href="mailto:${esc(b.email)}">${esc(b.email)}</a></div></div></div>`:''}
          ${b.website?`<div class="ii"><div class="ii-ico">🌐</div><div class="ii-body"><div class="ii-lbl">Website</div><div class="ii-val"><a href="${esc(b.website)}" target="_blank">${esc(b.website.replace('https://',''))}</a></div></div></div>`:''}
          ${b.openTime?`<div class="ii"><div class="ii-ico">🕐</div><div class="ii-body"><div class="ii-lbl">Hours</div><div class="ii-val">${fmt12(b.openTime)} – ${fmt12(b.closeTime)}</div></div></div>`:''}
          ${b.expiresAt&&b.plan!=='basic'?`<div class="ii"><div class="ii-ico">📅</div><div class="ii-body"><div class="ii-lbl">Listed Until</div><div class="ii-val">${(b.expiresAt?.toDate?b.expiresAt.toDate():new Date(b.expiresAt)).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}</div></div></div>`:''}
        </div>
      </div>

      ${b.lat&&b.lng?`<div class="section" style="padding:0;"><div style="padding:15px 20px 10px;"><div class="sec-t">Location</div></div><div id="bizMap"></div><a href="https://www.google.com/maps/search/${encodeURIComponent((b.name||'')+' '+(b.location||'')+(b.city||''))}" target="_blank" style="display:block;text-align:center;padding:11px;font-size:13px;font-weight:700;color:var(--green);text-decoration:none;border-top:1px solid var(--border);">Open in Google Maps →</a></div>`:''}

      ${b.tags?`<div class="section"><div class="sec-t">Tags</div><div class="tag-cloud">${(b.tags||'').split(',').map(t=>t.trim()).filter(Boolean).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div></div>`:''}

      <div class="section">
        <div class="sec-t">Reviews</div>
        <div id="revsList"></div>
        <div class="rev-form">
          <div class="rf-title">Leave a Review</div>
          <div class="rv-stars-sel">
            <span class="rs" data-v="1" onclick="setRS(1)">★</span>
            <span class="rs" data-v="2" onclick="setRS(2)">★</span>
            <span class="rs" data-v="3" onclick="setRS(3)">★</span>
            <span class="rs" data-v="4" onclick="setRS(4)">★</span>
            <span class="rs" data-v="5" onclick="setRS(5)">★</span>
          </div>
          <input type="text" id="revName" placeholder="Your name (optional)">
          <textarea id="revText" placeholder="Share your experience…"></textarea>
          <button class="sub-rev" onclick="submitReview('${b.id}')">Submit Review</button>
        </div>
      </div>

      ${simHtml}
    `;
    renderRevs(b.id);
    setTimeout(()=>initMap(b),300);
  }catch(e){document.getElementById('content').innerHTML=`<div class="loading">❌ ${e.message}</div>`;}
}
init();
</script>
</body>
