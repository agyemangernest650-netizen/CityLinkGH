<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="canonical" href="https://citylinkgh.vercel.app/business.html">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏪</text></svg>">
<title>CityLinkGH — Business</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#D4A017;--green:#1A6B3C;--red:#C0392B;--ink:#0D0D0D;
    --cream:#FDFAF3;--mist:#F0EBE0;--border:#E2D9C8;--gray:#7A7265;
    --purple:#9B59B6;--wa:#25D366;--blue:#2563EB;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Epilogue',sans-serif;background:var(--cream);color:var(--ink);}

  /* HEADER */
  header{background:var(--ink);padding:11px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200;}
  .back{background:rgba(255,255,255,.1);border:none;color:#fff;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;text-decoration:none;flex-shrink:0;}
  .htitle{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .hbtn{background:rgba(255,255,255,.1);border:none;color:#fff;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;flex-shrink:0;transition:background .2s;}
  .hbtn:hover{background:rgba(255,255,255,.2);}
  .hbtn.fav-active{background:var(--red);color:#fff;}

  /* PLAN STRIP */
  .plan-strip{height:4px;width:100%;}
  .strip-premium{background:linear-gradient(90deg,var(--purple),#FFD700);}
  .strip-featured{background:linear-gradient(90deg,var(--gold),#FFA500);}
  .strip-standard{background:var(--green);}
  .strip-basic{background:var(--border);}

  /* ── GALLERY ── */
  .gallery-wrap{position:relative;background:#111;overflow:hidden;}
  .gallery-main{width:100%;height:240px;position:relative;overflow:hidden;cursor:zoom-in;}
  .gallery-main img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s;}
  .gallery-main .hero-ov{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(13,13,13,.6) 100%);}
  .gallery-count{position:absolute;bottom:10px;right:12px;background:rgba(0,0,0,.6);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;backdrop-filter:blur(4px);}
  .gallery-nav{position:absolute;top:50%;transform:translateY(-50%);display:flex;justify-content:space-between;width:100%;padding:0 10px;pointer-events:none;}
  .gnav{pointer-events:all;background:rgba(0,0,0,.45);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);transition:background .2s;}
  .gnav:hover{background:rgba(0,0,0,.7);}
  .plan-ribbon{position:absolute;top:14px;left:0;font-size:10px;font-weight:800;padding:5px 12px 5px 10px;clip-path:polygon(0 0,100% 0,calc(100% - 9px) 100%,0 100%);letter-spacing:.06em;z-index:2;}
  .ribbon-premium{background:linear-gradient(90deg,var(--purple),#c39bd3);color:#fff;}
  .ribbon-featured{background:var(--gold);color:var(--ink);}
  .ribbon-standard{background:var(--green);color:#fff;}
  /* Thumbnail strip */
  .thumb-strip{display:flex;gap:5px;overflow-x:auto;padding:6px 10px;background:#111;scrollbar-width:none;}
  .thumb-strip::-webkit-scrollbar{display:none;}
  .thumb-item{flex-shrink:0;width:58px;height:46px;border-radius:6px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .2s,opacity .2s;opacity:.6;}
  .thumb-item.active{border-color:var(--gold);opacity:1;}
  .thumb-item img{width:100%;height:100%;object-fit:cover;display:block;}
  .thumb-item .thumb-emoji{width:100%;height:100%;background:var(--mist);display:flex;align-items:center;justify-content:center;font-size:20px;}

  /* LIGHTBOX */
  #lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:9999;flex-direction:column;align-items:center;justify-content:center;touch-action:none;}
  .lb-topbar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:linear-gradient(rgba(0,0,0,.7),transparent);}
  .lb-counter{color:rgba(255,255,255,.8);font-size:13px;font-weight:600;}
  .lb-close{background:rgba(255,255,255,.15);border:none;color:#fff;width:38px;height:38px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
  .lb-main{display:flex;align-items:center;gap:8px;width:100%;justify-content:center;padding:0 6px;}
  .lb-nav{background:rgba(255,255,255,.12);border:none;color:#fff;width:44px;height:44px;border-radius:50%;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);flex-shrink:0;transition:background .2s;}
  .lb-nav:hover{background:rgba(255,255,255,.25);}
  #lbImg{max-width:calc(100vw - 110px);max-height:72vh;border-radius:10px;object-fit:contain;flex:1;transition:opacity .2s;}
  .lb-thumbs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:4px 10px;margin-top:12px;}
  .lb-thumbs::-webkit-scrollbar{display:none;}
  .lb-thumb{width:50px;height:44px;border-radius:6px;object-fit:cover;cursor:pointer;opacity:.45;border:2px solid transparent;flex-shrink:0;transition:all .2s;}
  .lb-thumb.active{opacity:1;border-color:var(--gold);}
  .lb-caption{color:rgba(255,255,255,.6);font-size:12px;margin-top:8px;text-align:center;}

  /* MAIN CARD */
  .main-card{background:#fff;padding:14px 14px 16px;border-bottom:1px solid var(--border);}
  .biz-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px;}
  .biz-name{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;line-height:1.15;}
  .badges{display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0;}
  .badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px;white-space:nowrap;}
  .b-premium{background:var(--purple);color:#fff;}
  .b-featured{background:var(--gold);color:var(--ink);}
  .b-standard{background:var(--green);color:#fff;}
  .b-verified{background:var(--green);color:#fff;}
  .b-top{background:#FF6B35;color:#fff;}
  .biz-cat{font-size:12px;font-weight:700;color:var(--green);letter-spacing:.05em;text-transform:uppercase;margin-bottom:7px;}
  .rating-row{display:flex;align-items:center;gap:7px;margin-bottom:9px;}
  .stars{font-size:16px;color:var(--gold);}
  .rnum{font-size:14px;font-weight:700;}
  .rcnt{font-size:12px;color:var(--gray);}
  .open-row{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;margin-bottom:6px;}
  .dot-o{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;}
  .dot-c{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;}
  .txt-o{color:var(--green);}
  .txt-c{color:var(--red);}
  .hrs{color:var(--gray);font-weight:400;font-size:12px;}
  .countdown-pill{display:inline-flex;align-items:center;gap:5px;background:var(--mist);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;color:var(--ink);margin-bottom:12px;}
  .countdown-red{background:#fff0f0;border-color:var(--red);color:var(--red);}

  /* STATS ROW */
  .stats-row{display:flex;gap:0;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:13px;}
  .stat-item{flex:1;padding:9px 6px;text-align:center;border-right:1px solid var(--border);}
  .stat-item:last-child{border-right:none;}
  .stat-num{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--ink);}
  .stat-lbl{font-size:10px;color:var(--gray);margin-top:1px;}

  /* EXPIRY */
  .expiry-notice{background:#fff3cd;border:1px solid var(--gold);border-radius:10px;padding:10px 13px;font-size:12px;color:#856404;font-weight:600;margin-bottom:13px;}

  /* ACTION BUTTONS */
  .act-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
  .act-btn{padding:13px;border-radius:12px;border:none;font-family:'Epilogue',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;text-decoration:none;transition:opacity .15s,transform .1s;color:inherit;}
  .act-btn:active{transform:scale(.97);}
  .act-btn:hover{opacity:.87;}
  .btn-call{background:var(--green);color:#fff;grid-column:span 2;font-size:15px;padding:15px;}
  .btn-wa{background:var(--wa);color:#fff;}
  .btn-dir{background:var(--mist);color:var(--ink);border:1.5px solid var(--border);}
  .btn-web{background:var(--ink);color:#fff;}
  .btn-shr{background:var(--mist);color:var(--ink);border:1.5px solid var(--border);}
  .btn-book{background:var(--blue);color:#fff;}
  .btn-enq{background:#fff;color:var(--ink);border:1.5px solid var(--border);}
  .btn-save{background:#fff0f5;color:var(--red);border:1.5px solid #fcc;}

  /* UPGRADE BANNER */
  .upgrade-banner{margin-top:13px;border-radius:12px;padding:13px;cursor:pointer;}
  .upgrade-banner.to-featured{background:linear-gradient(135deg,#fffbf0,#fff3cd);border:1px solid var(--gold);}
  .upgrade-banner.to-premium{background:linear-gradient(135deg,#f9f0ff,#e8d5f5);border:1px solid var(--purple);}
  .ub-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;margin-bottom:3px;}
  .ub-sub{font-size:12px;color:var(--gray);}

  /* SECTIONS */
  .section{padding:13px 14px;border-bottom:1px solid var(--border);background:#fff;margin-top:6px;}
  .sec-t{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--ink);margin-bottom:11px;display:flex;align-items:center;gap:7px;}
  .sec-t::before{content:'';width:4px;height:16px;background:var(--gold);border-radius:2px;display:block;}
  .desc{font-size:14px;color:var(--gray);line-height:1.8;}

  /* SERVICES */
  .service-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
  .service-item:last-child{border-bottom:none;}
  .svc-name{font-size:13px;font-weight:600;}
  .svc-desc{font-size:12px;color:var(--gray);margin-top:2px;}
  .svc-price{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--green);white-space:nowrap;margin-left:12px;}

  /* HOURS TABLE */
  .hours-table{width:100%;}
  .hours-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .hours-row:last-child{border-bottom:none;}
  .day-label{font-weight:600;color:var(--ink);}
  .day-label.today{color:var(--green);font-weight:800;}
  .hours-val{color:var(--gray);}
  .hours-val.open-now{color:var(--green);font-weight:700;}
  .hours-val.closed-day{color:var(--red);}

  /* INFO LIST */
  .info-list{display:flex;flex-direction:column;gap:11px;}
  .ii{display:flex;align-items:flex-start;gap:11px;}
  .ii-ico{font-size:18px;flex-shrink:0;width:24px;text-align:center;}
  .ii-body{flex:1;}
  .ii-lbl{font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
  .ii-val{font-size:13px;font-weight:500;color:var(--ink);}
  .ii-val a{color:var(--green);text-decoration:none;}
  #bizMap{height:200px;width:100%;background:var(--mist);}
  .tag-cloud{display:flex;flex-wrap:wrap;gap:7px;}
  .tag{background:var(--mist);color:var(--gray);font-size:12px;font-weight:500;padding:5px 11px;border-radius:10px;}

  /* PROMO BANNER */
  .promo-banner{background:linear-gradient(135deg,#1A6B3C,#2E8B57);border-radius:12px;padding:13px 14px;margin-bottom:13px;color:#fff;}
  .promo-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;margin-bottom:3px;}
  .promo-sub{font-size:12px;opacity:.85;}
  .promo-badge{display:inline-block;background:var(--gold);color:var(--ink);font-size:10px;font-weight:800;padding:2px 8px;border-radius:6px;margin-bottom:7px;}

  /* BOOKING MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:8000;align-items:flex-end;}
  .modal-overlay.show{display:flex;}
  .modal-sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px 32px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease;}
  @keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
  .modal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;margin-bottom:14px;}
  .form-group{margin-bottom:11px;}
  .form-label{font-size:12px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;display:block;}
  .form-input{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-family:'Epilogue',sans-serif;font-size:14px;outline:none;background:#fff;color:var(--ink);transition:border-color .2s;}
  .form-input:focus{border-color:var(--gold);}
  textarea.form-input{resize:none;min-height:80px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .modal-submit{width:100%;background:var(--green);color:#fff;border:none;padding:14px;border-radius:12px;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;cursor:pointer;margin-top:6px;transition:opacity .2s;}
  .modal-submit:hover{opacity:.9;}
  .modal-submit:disabled{opacity:.5;cursor:not-allowed;}
  .modal-close{position:absolute;top:14px;right:16px;background:var(--mist);border:none;width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

  /* ENQUIRY */
  .enq-wa-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--wa);color:#fff;border:none;padding:13px;border-radius:12px;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;cursor:pointer;margin-top:8px;text-decoration:none;transition:opacity .2s;}

  /* REVIEWS */
  .rev-card{background:var(--cream);border-radius:12px;padding:12px;margin-bottom:9px;border:1px solid var(--border);}
  .rv-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
  .rv-name{font-size:13px;font-weight:700;}
  .rv-stars{font-size:13px;color:var(--gold);}
  .rv-txt{font-size:13px;color:var(--gray);line-height:1.65;}
  .rv-date{font-size:11px;color:var(--gray);margin-top:4px;}
  .rv-avatar{width:32px;height:32px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:12px;font-weight:800;color:#fff;flex-shrink:0;}
  .rev-form{background:var(--mist);border-radius:12px;padding:13px;border:1px solid var(--border);margin-top:11px;}
  .rv-stars-sel{display:flex;gap:8px;margin-bottom:10px;}
  .rs{font-size:28px;cursor:pointer;color:#ddd;transition:color .15s,transform .1s;}
  .rs.active{color:var(--gold);}
  .rs:hover{transform:scale(1.15);}
  .rev-form input,.rev-form textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-family:'Epilogue',sans-serif;font-size:13px;outline:none;background:#fff;margin-bottom:8px;transition:border-color .2s;}
  .rev-form textarea{resize:none;min-height:80px;}
  .rev-form input:focus,.rev-form textarea:focus{border-color:var(--gold);}
  .sub-rev{width:100%;background:var(--green);color:#fff;border:none;padding:12px;border-radius:10px;font-family:'Epilogue',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s;}
  .sub-rev:hover{opacity:.9;}
  .rev-avg-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);margin-bottom:12px;}
  .rev-avg-num{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;color:var(--gold);line-height:1;}
  .rev-avg-stars{font-size:18px;color:var(--gold);}
  .rev-avg-count{font-size:12px;color:var(--gray);margin-top:2px;}

  /* SIMILAR */
  .sim-scroll{display:flex;gap:11px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;}
  .sim-scroll::-webkit-scrollbar{display:none;}
  .sim-card{flex-shrink:0;width:148px;background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden;cursor:pointer;text-decoration:none;color:inherit;}
  .sim-thumb{width:100%;height:80px;background:var(--mist);display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden;}
  .sim-thumb img{width:100%;height:100%;object-fit:cover;}
  .sim-body{padding:8px;}
  .sim-name{font-family:'Syne',sans-serif;font-size:12px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sim-loc{font-size:10px;color:var(--gray);margin-top:2px;}

  /* SHARE CARD MODAL */
  .share-card{background:linear-gradient(135deg,var(--ink),#1a1a2e);border-radius:16px;padding:18px;color:#fff;margin-bottom:14px;}
  .sc-name{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:4px;}
  .sc-cat{font-size:12px;opacity:.7;margin-bottom:10px;}
  .sc-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
  .sc-pill{background:rgba(255,255,255,.12);border-radius:20px;padding:4px 11px;font-size:11px;}
  .sc-url{font-size:11px;opacity:.5;margin-top:8px;}
  .share-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .share-opt{padding:12px;border-radius:12px;border:none;font-family:'Epilogue',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:opacity .2s;}
  .share-opt:hover{opacity:.87;}
  .so-wa{background:var(--wa);color:#fff;}
  .so-copy{background:var(--mist);color:var(--ink);border:1.5px solid var(--border);}
  .so-more{background:var(--ink);color:#fff;grid-column:span 2;}

  /* NAV */
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:6px 0 env(safe-area-inset-bottom,16px);z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,.07);}
  .nav-item a{display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;}
  .ni{font-size:20px;}
  .nl{font-size:10px;font-weight:500;color:var(--gray);}
  .spacer{height:80px;}
  .loading{text-align:center;padding:56px 20px;color:var(--gray);font-size:14px;}
  .spin{display:inline-block;width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:sp .8s linear infinite;margin-bottom:10px;}
  @keyframes sp{to{transform:rotate(360deg)}}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(40px);background:var(--ink);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.25);transition:transform .3s,opacity .3s;z-index:9999;opacity:0;}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

  @media(max-width:390px){
    .gallery-main{height:200px;}
    .act-grid{grid-template-columns:1fr 1fr;}
    .act-btn{font-size:11px;padding:10px 6px;}
    .biz-name{font-size:18px;}
  }
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- HEADER -->
<header>
  <a href="home.html" class="back">←</a>

// ── OPEN COUNTDOWN ──
function openCountdown(openTime,closeTime){
  if(!openTime||!closeTime)return '';
  const now=new Date();
  const cur=now.getHours()*60+now.getMinutes();
  const[oh,om]=openTime.split(':').map(Number);
  const[ch,cm]=closeTime.split(':').map(Number);
  const openMins=oh*60+om, closeMins=ch*60+cm;
  if(cur>=openMins&&cur<closeMins){
    const left=closeMins-cur;
    const h=Math.floor(left/60),m=left%60;
    return `<div class="countdown-pill">🕐 Closes in ${h?h+'h ':''} ${m}min</div>`;
  } else {
    const toOpen=cur<openMins?openMins-cur:(openMins+1440-cur);
    const h=Math.floor(toOpen/60),m=toOpen%60;
    return `<div class="countdown-pill countdown-red">⏱ Opens in ${h?h+'h ':''} ${m}min</div>`;
  }
}

  ];

  return `<div class="hours-table">
    ${DAYS.map((d,i)=>{
      const isToday=i===todayIdx;
      const open=b[`open_${d.toLowerCase()}`]||b.openTime;
      const close=b[`close_${d.toLowerCase()}`]||b.closeTime;
      const isClosed=b[`closed_${d.toLowerCase()}`]||false;
      const openNow=isToday&&isOpen(open,close);
      return `<div class="hours-row">
        <div class="day-label${isToday?' today':''}">${d}${isToday?' (Today)':''}</div>
        <div class="hours-val${openNow?' open-now':isClosed?' closed-day':''}">${isClosed?'Closed':open?`${fmt12(open)} – ${fmt12(close)}`:'—'}</div>
      </div>`;
    }).join('')}
  </div>`;
}

    const isTopRated=b.rating&&b.rating>=4.5&&reviewCount>=3;

    // Collect all images
    const allImages=[b.imageUrl,...(b.images||[])].filter(Boolean);

    // Similar businesses
    let simHtml='';
    try{
      const sq=query(collection(db,'businesses'),where('category','==',b.category),where('approved','==',true),limit(6));
      const ss=await getDocs(sq);
      const sim=ss.docs.map(d=>({id:d.id,...d.data()})).filter(s=>s.id!==id).slice(0,5);
      if(sim.length)simHtml=`<div class="section"><div class="sec-t">Similar Businesses</div><div class="sim-scroll">${sim.map(s=>`<a class="sim-card" href="business.html?id=${s.id}"><div class="sim-thumb">${s.imageUrl?`<img src="${esc(s.imageUrl)}" alt="">`:`${catEmoji[s.category]||'🏢'}`}</div><div class="sim-body"><div class="sim-name">${esc(s.name)}</div><div class="sim-loc">📍 ${esc(s.city||s.location||'')}</div></div></a>`).join('')}</div></div>`;
    }catch(_){}

    // Plan UI
    const ribbonHtml=plan==='premium'?`<div class="plan-ribbon ribbon-premium">👑 PREMIUM</div>`:plan==='featured'?`<div class="plan-ribbon ribbon-featured">⭐ FEATURED</div>`:plan==='standard'?`<div class="plan-ribbon ribbon-standard">✓ STANDARD</div>`:'';
    const badgeHtml=[
      plan==='premium'?'<span class="badge b-premium">👑 Premium</span>':'',
      plan==='featured'?'<span class="badge b-featured">⭐ Featured</span>':'',
      plan==='standard'?'<span class="badge b-standard">✓ Standard</span>':'',
      b.verified?'<span class="badge b-verified">✓ Verified</span>':'',
      isTopRated?'<span class="badge b-top">🏆 Top Rated</span>':''
    ].filter(Boolean).join('');
    const upgradeHtml=plan==='basic'?`<div class="upgrade-banner to-featured" onclick="window.location='submit.html'"><div class="ub-title">⭐ Upgrade to Featured — GHS 20/mo</div><div class="ub-sub">Gold border, top placement & verified badge.</div></div>`:plan==='standard'?`<div class="upgrade-banner to-premium" onclick="window.location='submit.html'"><div class="ub-title">👑 Upgrade to Premium — GHS 50/mo</div><div class="ub-sub">Premium Spotlight & #1 placement.</div></div>`:'';

    // Promo banner (if business has promo field)
    const promoHtml=b.promo?`<div class="promo-banner"><div class="promo-badge">🎉 OFFER</div><div class="promo-title">${esc(b.promo)}</div>${b.promoSub?`<div class="promo-sub">${esc(b.promoSub)}</div>`:''}</div>`:'';

    document.getElementById('content').innerHTML=`
      <div class="plan-strip strip-${plan}"></div>

      <!-- GALLERY -->
      <div class="gallery-wrap">
        <div class="gallery-main" id="galleryHero" onclick="openLightbox(gIndex)">
          <div style="font-size:64px;display:flex;align-items:center;justify-content:height:100%;background:var(--mist);align-items:center;justify-content:center;height:100%;">${emoji}</div>
          <div class="hero-ov"></div>
          ${ribbonHtml}
          <div class="gallery-count" id="galleryCount" style="display:none;"></div>
        </div>
        ${allImages.length>1?`<div class="gallery-nav"><button class="gnav" onclick="galPrev();event.stopPropagation()">‹</button><button class="gnav" onclick="galNext();event.stopPropagation()">›</button></div>`:''}
        <div class="thumb-strip" id="thumbStrip"></div>
      </div>

      <!-- MAIN INFO -->
      <div class="main-card">
        <div class="biz-hdr">
          <div class="biz-name">${esc(b.name)}</div>
          <div class="badges">${badgeHtml}</div>
        </div>
        <div class="biz-cat">${esc(b.category)}</div>
        ${b.rating?`<div class="rating-row"><span class="stars">${starsH(b.rating)}</span><span class="rnum">${Number(b.rating).toFixed(1)}</span><span class="rcnt">(${reviewCount} review${reviewCount!==1?'s':''})</span></div>`:''}
        ${openS!==null?`<div class="open-row"><div class="${openS?'dot-o':'dot-c'}"></div><span class="${openS?'txt-o':'txt-c'}">${openS?'Open Now':'Closed'}</span>${b.openTime?`<span class="hrs">· ${fmt12(b.openTime)} – ${fmt12(b.closeTime)}</span>`:''}</div>`:''}
        ${b.openTime?openCountdown(b.openTime,b.closeTime):''}

        <!-- STATS -->
        <div class="stats-row">
          <div class="stat-item"><div class="stat-num">👁 ${views>999?'1k+':views}</div><div class="stat-lbl">Views</div></div>
          <div class="stat-item"><div class="stat-num">⭐ ${b.rating?Number(b.rating).toFixed(1):'New'}</div><div class="stat-lbl">Rating</div></div>
          <div class="stat-item"><div class="stat-num">💬 ${reviewCount}</div><div class="stat-lbl">Reviews</div></div>
          <div class="stat-item"><div class="stat-num">📷 ${allImages.length||0}</div><div class="stat-lbl">Photos</div></div>
        </div>

        ${days!==null&&days<=7?`<div class="expiry-notice">⚠️ Listing expires in ${days} day${days!==1?'s':''}. <a href="submit.html" style="color:var(--red);font-weight:700;">Renew now →</a></div>`:''}
        ${promoHtml}

        <!-- ACTIONS -->
        <div class="act-grid">
          ${b.phone?`<a class="act-btn btn-call" href="tel:${esc(b.phone)}">📞 Call Now</a>`:''}
          ${wn?`<a class="act-btn btn-wa" href="https://wa.me/233${wn}" target="_blank">💬 WhatsApp</a>`:''}
          <button class="act-btn btn-book" onclick="openBooking()">📅 Book Appointment</button>
          <button class="act-btn btn-enq" onclick="openEnquiry()">✉️ Send Enquiry</button>
          <a class="act-btn btn-dir" href="https://www.google.com/maps/search/${encodeURIComponent((b.name||'')+' '+(b.location||'')+(b.city||''))}" target="_blank">🗺️ Directions</a>
          ${b.website?`<a class="act-btn btn-web" href="${esc(b.website)}" target="_blank">🌐 Website</a>`:''}
          <button class="act-btn btn-save" onclick="toggleFav()">🤍 Save</button>
          <button class="act-btn btn-shr" onclick="openShareModal()">🔗 Share</button>
        </div>
        ${upgradeHtml}
      </div>

      ${b.desc?`<div class="section"><div class="sec-t">About</div><div class="desc">${esc(b.desc)}</div></div>`:''}
      ${servicesHtml(b)}

      <!-- HOURS -->
      <div class="section"><div class="sec-t">Opening Hours</div>${hoursTable(b)}</div>

      <!-- CONTACT -->
      <div class="section">
        <div class="sec-t">Contact & Info</div>
        <div class="info-list">
          ${b.location||b.city?`<div class="ii"><div class="ii-ico">📍</div><div class="ii-body"><div class="ii-lbl">Address</div><div class="ii-val">${esc(b.location||'')}${b.location&&b.city?', ':''}${esc(b.city||'')}</div></div></div>`:''}
          ${b.phone?`<div class="ii"><div class="ii-ico">📞</div><div class="ii-body"><div class="ii-lbl">Phone</div><div class="ii-val"><a href="tel:${esc(b.phone)}">${esc(b.phone)}</a></div></div></div>`:''}
          ${b.whatsapp?`<div class="ii"><div class="ii-ico">💬</div><div class="ii-body"><div class="ii-lbl">WhatsApp</div><div class="ii-val"><a href="https://wa.me/233${waNum(b.whatsapp)}" target="_blank">${esc(b.whatsapp)}</a></div></div></div>`:''}
          ${b.email?`<div class="ii"><div class="ii-ico">✉️</div><div class="ii-body"><div class="ii-lbl">Email</div><div class="ii-val"><a href="mailto:${esc(b.email)}">${esc(b.email)}</a></div></div></div>`:''}
          ${b.website?`<div class="ii"><div class="ii-ico">🌐</div><div class="ii-body"><div class="ii-lbl">Website</div><div class="ii-val"><a href="${esc(b.website)}" target="_blank">${esc(b.website.replace(/^https?:\/\//,''))}</a></div></div></div>`:''}
        </div>
      </div>

      ${b.lat&&b.lng?`<div class="section" style="padding:0;"><div style="padding:14px 14px 10px;"><div class="sec-t">Location</div></div><div id="bizMap"></div><a href="https://www.google.com/maps/search/${encodeURIComponent((b.name||'')+' '+(b.location||'')+(b.city||''))}" target="_blank" style="display:block;text-align:center;padding:11px;font-size:13px;font-weight:700;color:var(--green);text-decoration:none;border-top:1px solid var(--border);">Open in Google Maps →</a></div>`:''}

      ${b.tags?`<div class="section"><div class="sec-t">Tags</div><div class="tag-cloud">${(b.tags||'').split(',').map(t=>t.trim()).filter(Boolean).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div></div>`:''}

      <!-- REVIEWS -->
      <div class="section">
        <div class="sec-t">Reviews</div>
        <div id="revsList"></div>
        <div class="rev-form">
          <div style="font-family:'Syne',sans-serif;font-size:13px;font-weight:800;margin-bottom:7px;">Leave a Review</div>
          <div class="rv-stars-sel">
            <span class="rs" data-v="1" onclick="setRS(1)">★</span>
            <span class="rs" data-v="2" onclick="setRS(2)">★</span>
            <span class="rs" data-v="3" onclick="setRS(3)">★</span>
            <span class="rs" data-v="4" onclick="setRS(4)">★</span>
            <span class="rs" data-v="5" onclick="setRS(5)">★</span>
          </div>
          <input type="text" id="revName" placeholder="Your name (optional)">
          <textarea id="revText" placeholder="Share your experience…"></textarea>
          <button class="sub-rev" onclick="submitReview('${b.id}')">📝 Submit Review</button>
        </div>
      </div>

      ${simHtml}
    `;

    renderRevs();
    initGallery(allImages, emoji);
    updateFavBtn();
    setTimeout(()=>initMap(b),300);

  }catch(e){document.getElementById('content').innerHTML=`<div class="loading">❌ ${e.message}</div>`;}
}

init();
</script>
</body>
</html>
